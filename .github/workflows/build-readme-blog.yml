name: Build README Blog

on:
  push:
    paths:
      - "posts/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Generate README blog
        shell: bash
        run: |
          set -e

          posts_sorted=$(ls -t posts/*.md)

          # 1. 简介（没有标题，只是一段话）
          : > README.md
          echo "This is William and the blog is generated by GitHub Actions. William's introduction could be found at [profile](https://github.com/0x3st)." >> README.md
          echo "" >> README.md
          echo "---" >> README.md

          # 2. 文章列表：按时间倒序，标题 + 阅读全文链接
          echo "这些是我的文章……"
          for f in $posts_sorted; do
            filename=$(basename "$f")
            date_part=${filename%%-*}
            title=$(grep -m 1 '^# ' "$f" | sed 's/^# //')
            echo "- ${date_part} ${title} [阅读全文]($f)" >> README.md
          done

      - name: Commit & push README
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-build README blog"
          branch: ${{ github.ref_name }}